name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Dummy Env
        # Docker Compose build might fail if .env is missing
        run: touch .env 

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push with Compose
        # This builds the images defined in your yaml and pushes them
        run: |
          docker compose build
          docker compose push

      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DJANGO_DEPLOY_HOOK }}
          curl -X POST ${{ secrets.RENDER_SPRING_DEPLOY_HOOK }}
