networks:
  freelancetrackerapp:
    driver: bridge

services: 
  freelancetrackerpdf:
    # 1. Update image name with your DockerHub username
    image: zico7/freelance_and_payment_tracker:freelancetrackerpdf 
    build: 
      context: ./freelanceTrackerPdf/freelanceTrackerPdf
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./.env  # 2. REMOVED the Windows E:\ path here
    networks:
      - freelancetrackerapp

  freelancetracker:
    image: zico7/freelance_and_payment_tracker:freelancetracker  # 1. Update image name
    build: 
      context: ./freelanceTracker
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate && gunicorn -b 0.0.0.0:8081 freelanceTracker.wsgi:application"
    env_file:
      - ./.env  # 2. REMOVED the Windows E:\ path here
    ports:
      - "8081:8081"
    networks:
      - freelancetrackerapp
    environment:
      - MONGO_HOST=${MONGO_HOST}
      - MONGO_ROOT_USER=${MONGO_ROOT_USER}
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_DB=${MONGO_DB}
    # Note: depends_on is fine for local, but Render ignores it
    depends_on:
      postgres_db:
        condition: service_healthy
      mongo_db:
        condition: service_started

  # On Render, you should use their Managed Databases instead of these containers,
  # but for the GitHub Action BUILD to work, these definitions are fine.
  postgres_db:
    image: postgres:18.3-alpine3.23
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
    env_file:
      - ./.env # 2. REMOVED the Windows E:\ path here
    networks:
      - freelancetrackerapp

  mongo_db:
    image: mongo:8.0
    networks:
      - freelancetrackerapp
    env_file:
      - ./.env # 2. REMOVED the Windows E:\ path here
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB} 

volumes:
  postgres_db:
  mongo_db:
