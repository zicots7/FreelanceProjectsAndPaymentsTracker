{% extends "baseMilestone.html" %}
{% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">

      <!-- Back Button -->
      <a href="{% url 'project-details' projects.Pid %}" class="btn btn-outline-secondary btn-sm mb-3">
        ← Milestone List
      </a>

      <!-- Card -->
      <div class="card shadow border-0 rounded-4">
        <div class="card-header bg-primary text-white py-3 px-4 rounded-top-4">
          <h5 class="mb-0 fw-bold">Add Milestone</h5>
        </div>
        <div class="card-body p-4">
          <form method="post">
            {% csrf_token %}
            {{ milestoneForm.as_p }}
            <div class="d-flex gap-2 mt-3">
              <button type="submit" class="btn btn-primary flex-grow-1">Submit</button>
              <a href="{% url 'project-details' projects.Pid %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

{% endblock %}
