{% extends 'basePayment.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="mb-3">
                <nav aria-label="breadcrumb" class="btn btn-outline-secondary btn-sm mb-2">
                 <a href="{% url 'project-details' projects.Pid %}" class="btn ">
        ← Payment List
      </a>
            </nav>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0 text-center">Update Project Details</h5>
                </div>

                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                            {{ form.as_p }}

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                Save Changes
                            </button>
                            <a href="{% url 'project-details' projects.Pid %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
