{% block baseProject %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ensures content doesn't get hidden behind the fixed footer */
        body { padding-bottom: 70px; }
        .nav-link { font-size: 0.9rem; transition: 0.3s; }
        .nav-link:hover { color: #0d6efd !important; }
    </style>
  </head>
  <body>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <nav class="navbar fixed-top navbar-dark bg-dark border-top border-secondary shadow-lg">
        <div class="container-fluid justify-content-around">

            {% if request.user.is_authenticated %}
                <div class="d-flex align-items-center gap-3">

                    {% if request.user.is_demo %}
                        <span class="badge bg-warning text-dark">
                            Demo Mode — Read Only
                        </span>
                    {% endif %}

                    <span class="text-white">
                        {{ request.user.username }}
                        <span class="badge bg-secondary ms-1">
                            {{ request.user.role }}
                        </span>
                    </span>

                </div>
            {% endif %}
            <a class="nav-link text-light text-center" href="{% url 'client-dashboard' %}">
                <div class="d-block mb-1"></div>
                <span>Home</span>
            </a>
            <a class="nav-link text-light text-center" href="{% url 'client-project-list' %}">
                <div class="d-block mb-1"></div>
                <span>Projects</span>
            </a>


            <form method="POST" action="{% url 'logout' %}" class="m-0">
                {% csrf_token %}
                <button type="submit" class="nav-link text-light text-center bg-transparent border-0">
                    <div class="d-block mb-1"></div>
                    <span>Logout</span>
                </button>
            </form>

        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
{% endblock %}
