apiVersion: apps/v1
kind: Deployment
metadata:
  name: freelancetrackerpdf-deployment
  namespace: freelance-tracker
  labels:
    app: freelancetrackerpdf
spec:
  replicas: 2
  selector:
    matchLabels:
      app: freelancetrackerpdf
  template:
    metadata:
      labels:
        app: freelancetrackerpdf
    spec:
      containers:
        - name: freelancetrackerpdf
          image: 'zico7/freelance_and_payment_tracker:freelancetrackerpdf'
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: freelancetrackerpdf-service
  namespace: freelance-tracker
spec:
  selector:
    app: freelancetrackerpdf
  ports:
  - port: 8080
    targetPort: 8080