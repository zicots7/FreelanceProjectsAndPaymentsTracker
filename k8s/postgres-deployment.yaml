apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: freelance-tracker
  labels:
    app: postgres
spec:
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: zico7/freelance_and_payment_tracker:postgres_db
          ports:
            - containerPort: 5432
          env:
          - name: POSTGRES_DB
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: POSTGRES_DB
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: POSTGRES_USER
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: POSTGRES_PASSWORD
          - name: POSTGRES_HOST
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: POSTGRES_HOST
 
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: freelance-tracker
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432